<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Meu Painel IPTV</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 40px; text-align: center; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; display: inline-block; text-align: left; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; }
        button { background: #28a745; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚀 Painel BR XTREME</h1>
    <div class="container">
        <label>Token do GitHub:</label>
        <input type="password" id="token" placeholder="Cole seu token aqui">
        <hr>
        <label>Nome do Cliente:</label>
        <input type="text" id="user" placeholder="Ex: joao_iptv">
        <label>Senha do Cliente:</label>
        <input type="text" id="pass" placeholder="Ex: 123456">
        <button onclick="criarCliente()">CRIAR CLIENTE AGORA</button>
    </div>

    <script>
        async function criarCliente() {
            const token = document.getElementById('token').value;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            if(!token || !user) return alert("Preencha o Token e o Usuário!");

            const expira = Math.floor(Date.now() / 1000) + (30 * 86400); // 30 dias
            const conteudo = btoa(`<?php echo json_encode(["user_info" => ["auth" => 1, "status" => "Active", "exp_date" => "${expira}", "username" => "${user}", "password" => "${pass}"]]); ?>`);

            const url = `https://api.github.com/repos/BRASILCANAISLTDA/painelbrxtremee/contents/clientes/${user}/index.php`;

            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Novo cliente ${user}`, content: conteudo })
            });

            if(res.ok) alert("✅ Cliente criado com sucesso!");
            else alert("❌ Erro! Verifique seu Token.");
        }
    </script>
</body>
</html>
